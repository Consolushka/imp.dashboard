<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMP Analytics</title>
    
    <!-- Tailwind CSS (CDN) и плагины -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    
    <!-- Настройка темы Tailwind -->
    <script id="tailwind-config">
        window.tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#1c1b1b",
                        "surface": "#fdf8f8",

                        "surface-dim": "#ddd9d8",

                        "secondary-container": "#fe6a34",
                        "on-secondary-fixed-variant": "#832600",
                        "secondary-fixed": "#ffdbd0",
                        "surface-container-highest": "#e5e2e1",

                        "status-positive": "#2ECC71",

                        "tertiary": "#000000",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#c4c7c7",
                        "surface-variant": "#e5e2e1",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "jumbo": "48px",
                        "base": "8px",
                        "xs": "8px",
                        "xl": "32px",
                        "md": "16px",
                        "lg": "24px",
                        "sm": "12px",

                        "label-caps": ["IBM Plex Mono"],
                        "body-reg": ["Inter"],
                        "data-mono": ["IBM Plex Mono"],
